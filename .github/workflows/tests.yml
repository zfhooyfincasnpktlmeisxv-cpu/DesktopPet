name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  engine-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run engine unit tests (no GUI)
        run: |
          python -m unittest tests.test_desktop_pet.TestConstants tests.test_desktop_pet.TestRichmanEngine tests.test_desktop_pet.TestChessEngine -v
