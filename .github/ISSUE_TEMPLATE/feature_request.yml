name: Feature request
description: Suggest an idea for Desktop Pet
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Pet / animations
        - Shop / economy
        - Mini-games
        - Monopoly
        - Chess
        - i18n / UI
        - Packaging / installer
        - Other
